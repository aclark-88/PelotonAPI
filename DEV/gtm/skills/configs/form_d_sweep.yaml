# form_d_sweep — daily Form D discovery
lookback_days: 1
min_offering_usd: 25000000      # filings below this are skipped (None/indefinite passes)
max_filings: 200                # hard cap per sweep (EDGAR fair-access volume guard)

# Only pooled investment vehicles are candidates
require_pooled_investment: true

# Form D self-declared fund types to hard-drop (self-classification is noisy;
# verification workflow remains the authority — see DEV/README.md)
exclude_fund_types:
  - Private Equity Fund
  - Venture Capital Fund

# Name tokens that mark non-ICP vehicles even when typed "Hedge Fund"
negative_name_terms:
  - real estate
  - realty
  - direct lending
  - infrastructure
  - royalty
  - buyout
  - reit
