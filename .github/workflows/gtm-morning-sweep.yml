name: GTM Morning Sweep

# Runs the daily discovery -> verify -> score -> resolve -> draft-queue chain
# in the cloud, independent of any laptop. 10:00 UTC = 06:00 America/New_York
# (EDT). GitHub cron is UTC and does NOT shift for DST — in winter (EST) this
# fires at 05:00 ET; adjust to '0 11 * * *' if a strict 6am ET is needed.
#
# IMPORTANT: GitHub scheduled workflows only fire from the DEFAULT branch
# (master). Merge this there for the cron to run.
#
# Repo root is PelotonAPI/; the project lives in the DEV/ subdir, so every job
# step runs with working-directory: DEV.

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:        # manual "Run workflow" button for on-demand sweeps
    inputs:
      lookback_days:
        description: "Form D lookback window (days)"
        default: "1"

permissions:
  contents: read

concurrency:
  group: gtm-morning-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: DEV
    env:
      PYTHONIOENCODING: "utf-8"
      EDGAR_IDENTITY: ${{ secrets.EDGAR_IDENTITY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
      HEYREACH_API_KEY: ${{ secrets.HEYREACH_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '1' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: DEV/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning sweep
        run: python -m gtm.orchestrator.daily_morning_sweep

      # Digest + logs hold prospect data, so they are NEVER committed to the
      # repo tree — only uploaded as a private, access-controlled artifact
      # (repo collaborators only) and summarized to Slack when configured.
      - name: Upload digest + logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gtm-digest-${{ github.run_id }}
          path: |
            DEV/gtm/briefs/digest_*.md
            DEV/logs/**
          if-no-files-found: ignore
          retention-days: 30
