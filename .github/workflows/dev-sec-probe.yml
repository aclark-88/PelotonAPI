name: DEV SEC Connectivity Probe

# One-shot: does a GitHub-hosted runner reach SEC.gov (which the Anthropic cloud
# sandbox does not)? Runs the stdlib probe and commits the result back so we can
# read it. Triggered by pushing this file or the probe script.
on:
  workflow_dispatch:
  push:
    branches: ["claude/coremont-edgar-signal-engine-KQYJb"]
    paths:
      - "DEV/tools/diag_connectivity.py"
      - ".github/workflows/dev-sec-probe.yml"

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/coremont-edgar-signal-engine-KQYJb
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Probe SEC reachability from the GitHub runner
        working-directory: DEV
        env:
          EDGAR_IDENTITY: "Coremont Clarion Prospecting malex.clark@gmail.com"
        run: python tools/diag_connectivity.py
      - name: Commit probe result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f DEV/briefs/connectivity.txt
          git commit -m "GH runner SEC connectivity probe [skip ci]" || echo "no change"
          git pull --rebase origin claude/coremont-edgar-signal-engine-KQYJb || true
          git push origin HEAD:claude/coremont-edgar-signal-engine-KQYJb
